<ion-header>
  <ion-toolbar color="blue">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
      <ion-title>Configuración</ion-title>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content color="dark" class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Agregar categoría</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <form #categoryForm="ngForm" (ngSubmit)="add(categoryForm.value)">
        <ion-grid class="ion-padding-top">
          <ion-row>
            <ion-col>
              <ion-input type="number" label="ID Categoría" labelPlacement="floating" fill="outline" name="id"
                [(ngModel)]="propId" readonly [value]="propId"></ion-input>
            </ion-col>
          </ion-row>
          <ion-row>
            <ion-col>
              <ion-input type="text" label="Nombre Categoría" labelPlacement="floating" fill="outline" name="name"
                ngModel maxlength="20" #title (keyup)="check(title.value)"></ion-input>
            </ion-col>
          </ion-row>
          <ion-row>
            <ion-col>
              <ion-button color="blue" expand="block" size="large" type="submit" [disabled]="propDisabled">
                <ion-icon name="save" slot="start"></ion-icon>
                Guardar
              </ion-button>
            </ion-col>
          </ion-row>
        </ion-grid>
      </form>
    </ion-card-content>
  </ion-card>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Lista de categorías</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list lines="full">
        <div *ngIf="(objectCategories === null || categories === '[]'); then ifBlock else elseBlock"></div>

        <ng-template #ifBlock>
          <ion-item>
            <ion-text color="gel-light">No hay categorías para mostrar.</ion-text>
          </ion-item>
        </ng-template>

        <ng-template #elseBlock>
          <ion-item *ngFor="let category of objectCategories; index as indexId">
            <ion-icon slot="end" name="trash" color="blue" [id]="indexId">
            </ion-icon>
            {{category.name}}

            <ion-alert [trigger]="indexId" header="¿Estas seguro(a)?" message="¿Desea eliminar la categoría?"
              [buttons]="propButtonDelete" (didDismiss)="setResult($event, indexId, category.name)">
            </ion-alert>

          </ion-item>
        </ng-template>
      </ion-list>
    </ion-card-content>
  </ion-card>
</ion-content>
